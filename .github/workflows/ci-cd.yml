name: Kitchen App CI

on:
  push:
    branches:
      - main
      - student/**
  pull_request:

jobs:
  api-test-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          NODE_ENV: test
          ENABLE_ORDER_SIMULATION: false
        run: npm test -- --runInBand

  docker-build:
    runs-on: ubuntu-latest
    needs: api-test-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t kitchen-api:ci ./api --target production

      - name: Build Web image
        run: docker build -t kitchen-web:ci ./web-ui

  manifests-sanity:
    runs-on: ubuntu-latest
    needs: api-test-and-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint manifests
        run: |
          yamllint \
            -d '{extends: default, rules: {line-length: {max: 220}}}' \
            k8s

      - name: Validate key files are non-empty
        run: |
          test -s k8s/namespace.yaml
          test -s k8s/db/statefulset.yaml
          test -s k8s/api/deployment.yaml
          test -s k8s/web-ui/deployment.yaml
          test -s k8s/monitoring/prometheus-config.yaml
          test -s k8s/monitoring/grafana-dashboard.yaml
          test -s k8s/monitoring/grafana-deployment.yaml
